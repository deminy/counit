services:
  php:
    build:
      context: ./dockerfiles/php
    tty: true
    links:
      - mysql
      - redis
      - web
    volumes:
      - ./:/var/www
  swoole:
    build:
      context: ./dockerfiles/swoole
    tty: true
    links:
      - mysql
      - redis
      - web
    volumes:
      - ./:/var/www
  mysql:
    image: mysql
    environment:
      MYSQL_DATABASE: test
      MYSQL_USER: username
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: password
  redis:
    image: redis
  web:
    image: phpswoole/swoole
    volumes:
      - ./tests/server.php:/var/www/server.php
